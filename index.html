<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Menù</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Font elegante -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #0f0f0f;
      color: #f5f5f5;
      text-align: center;
    }

    .container {
      padding: 40px 20px;
      max-width: 600px;
      margin: auto;
    }

    img.logo {
      width: 120px;
      margin: 40px auto 20px;
      display: block;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 30px;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    p {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 40px;
    }

    a.button {
      display: inline-block;
      padding: 16px 32px;
      background: linear-gradient(135deg, #c9a96e, #a67c3b);
      color: #000;
      text-decoration: none;
      border-radius: 30px;
      font-weight: 500;
      font-size: 16px;
      transition: 0.3s;
    }

    a.button:hover {
      opacity: 0.85;
    }

    .footer {
      margin-top: 60px;
      font-size: 12px;
      color: #777;
    }

  </style>
</head>
<body>

  <div class="container">

    <img src="logo.png" alt="Logo" class="logo">

    <h1>Il nostro menù</h1>
    <p>Dalla colazione al dopocena</p>

    <a class="button" href="menu.pdf" target="_blank">
      Scopri il menù
    </a>

    <div class="footer">
      © 2026 Il tuo Bar
    </div>

  </div>

</body>
</html>
