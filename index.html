<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Menù</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Font eleganti -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      color: white;
      text-align: center;
      background: url('sfondo.jpg') no-repeat center center/cover;
    }

    /* Overlay scuro */
    .overlay {
      background: rgba(0,0,0,0.65);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      padding: 30px;
      max-width: 500px;
      animation: fadeIn 1.2s ease;
    }

    img.logo {
      width: 110px;
      margin-bottom: 20px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    p {
      font-size: 15px;
      color: #ddd;
      margin-bottom: 40px;
    }

    .icons {
      font-size: 22px;
      margin-bottom: 20px;
      opacity: 0.8;
    }

    a.button {
      display: inline-block;
      padding: 16px 34px;
      background: linear-gradient(135deg, #d4af37, #b8962e);
      color: black;
      text-decoration: none;
      border-radius: 30px;
      font-weight: 500;
      font-size: 16px;
      transition: all 0.3s ease;
    }

    a.button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(212,175,55,0.6);
    }

    .footer {
      margin-top: 50px;
      font-size: 12px;
      color: #aaa;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }

  </style>
</head>
<body>

  <div class="overlay">
    <div class="container">

      <img src="logo.png" alt="Logo" class="logo">

      <div class="icons">☕ 🍸</div>

      <h1>Il nostro menù</h1>
      <p>Dalla colazione al dopocena</p>

      <a class="button" href="menu.pdf" target="_blank">
        Scopri il menù
      </a>

      <div class="footer">
        © 2026 Il tuo Bar
      </div>

    </div>
  </div>

</body>
</html>
